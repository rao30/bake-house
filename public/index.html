<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The BakeHouse Menu</title>
    <!-- Tailwind CSS (Styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <style>
        :root {
            --color-bg: #f9f3e5;
            --color-text: #4a3b32;
            --color-accent: #ebaeb3;
            --color-accent-dark: #d65a66;
        }
        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: "Courier Prime", monospace;
            min-height: 100vh;
        }
        h1, h2, h3, .font-serif {
            font-family: "Playfair Display", serif;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .texture-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.4;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.15'/%3E%3C/svg%3E");
            z-index: -1;
        }
        .nav-btn.active { border-color: #4a3b32; background-color: #4a3b32; color: #f9f3e5; }
        .nav-btn.inactive { border-color: transparent; color: rgba(74, 59, 50, 0.7); }
        .nav-btn.inactive:hover { border-color: rgba(74, 59, 50, 0.3); color: #4a3b32; }
        #callModal.hidden, #cartModal.hidden { visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>
    <div class="texture-overlay"></div>
    <div id="app" class="min-h-screen pb-24 sm:pb-12 relative"></div>
    <script src="/app.js" defer></script>
</body>
</html>
