<!DOCTYPE html>
<html lang="en-IN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The BakeHouse — Handcrafted Cakes, Cupcakes &amp; Brownies | Order on WhatsApp</title>
    <meta name="description" content="The BakeHouse is a small-batch bakery handcrafting fresh cream cakes, cupcakes, brownies, cookies, donuts and tea-time loaves. Order custom cakes and seasonal hampers on WhatsApp." />
    <meta name="theme-color" content="#4a3b32" />
    <link rel="canonical" href="https://thebakehouse.in/" />

    <!-- Open Graph / WhatsApp / Facebook -->
    <meta property="og:type" content="restaurant.menu" />
    <meta property="og:title" content="The BakeHouse — Handcrafted bakes, made with love" />
    <meta property="og:description" content="Custom cakes, cupcakes, brownies, cookies and seasonal hampers. Order on WhatsApp at +91 9849450882." />
    <meta property="og:image" content="https://thebakehouse.in/images/menu/facility_01.webp" />
    <meta property="og:image:alt" content="Inside The BakeHouse" />
    <meta property="og:url" content="https://thebakehouse.in/" />
    <meta property="og:site_name" content="The BakeHouse" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The BakeHouse — Handcrafted bakes, made with love" />
    <meta name="twitter:description" content="Custom cakes, cupcakes, brownies, cookies and seasonal hampers. Order on WhatsApp." />
    <meta name="twitter:image" content="https://thebakehouse.in/images/menu/facility_01.webp" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts: preconnect + display=swap -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

    <!-- Compiled Tailwind -->
    <link rel="stylesheet" href="/styles.css" />

    <!-- Preload hero image so LCP is fast -->
    <link rel="preload" as="image" href="/images/menu/facility_01.webp" />

    <!-- JSON-LD: Bakery schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Bakery",
      "name": "The BakeHouse",
      "url": "https://thebakehouse.in/",
      "image": "https://thebakehouse.in/images/menu/facility_01.webp",
      "telephone": "+91-9849450882",
      "email": "support@thebakehouse.in",
      "priceRange": "₹₹",
      "servesCuisine": ["Bakery", "Desserts", "Cakes"],
      "openingHoursSpecification": [{
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": [
          "Monday", "Tuesday", "Wednesday", "Thursday",
          "Friday", "Saturday", "Sunday"
        ],
        "opens": "09:00",
        "closes": "21:00"
      }],
      "sameAs": [
        "https://www.instagram.com/bakehouse.52"
      ],
      "hasMenu": "https://thebakehouse.in/#menu"
    }
    </script>
</head>
<body>
    <div class="texture-overlay"></div>
    <div id="app" class="min-h-screen pb-24 sm:pb-12 relative"></div>
    <script src="/app.js" defer></script>
</body>
</html>
